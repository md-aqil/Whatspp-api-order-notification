# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "Whatspp-api-order-notification"

[setup]
script = ""

[[actions]]
name = "Run"
icon = "run"
command = "npm run dev:no-reload"

[[actions]]
name = "run-bat"
icon = "tool"
command = '''
#!/bin/bash

# WhatsApp Commerce Hub - Start Next.js and Cloudflare Tunnel
# Usage: ./start-tunnel.sh

echo "=========================================="
echo "  WhatsApp Commerce Hub - Starting Everything"
echo "=========================================="
echo ""

# Check if cloudflared is installed
if ! command -v cloudflared &> /dev/null; then
    echo "ERROR: cloudflared is not installed"
    echo "Please install: brew install cloudflared"
    exit 1
fi

# Check if npm is installed
if ! command -v npm &> /dev/null; then
    echo "ERROR: npm is not installed"
    echo "Please install Node.js from https://nodejs.org/"
    exit 1
fi

# Check if config files exist
if [ ! -f "tunnel-config/config.yaml" ]; then
    echo "ERROR: config.yaml not found"
    echo "Please run setup-cloudflare-tunnel.bat first"
    exit 1
fi

if [ ! -f "tunnel-config/credentials.json" ]; then
    echo "ERROR: credentials.json not found"
    echo "Please run setup-cloudflare-tunnel.bat first"
    exit 1
fi

echo "✅ npm and cloudflared are installed"
echo "✅ Configuration files found"
echo ""

echo "=========================================="
echo "Starting Next.js app and Cloudflare Tunnel"
echo "=========================================="
echo ""
echo "Next.js will start on http://localhost:3000"
echo "Tunnel URL: https://lcsw.dpdns.org"
echo ""
echo "Press Ctrl+C to stop everything"
echo ""

# Start Next.js in background
echo "Starting Next.js..."
npm run dev &
NEXT_PID=$!

# Wait for Next.js to start
echo "Waiting for Next.js to start..."
sleep 10

# Start Cloudflare tunnel
echo "Starting Cloudflare Tunnel..."
cloudflared tunnel --config tunnel-config/config.yaml run

# If tunnel stops, kill Next.js
kill $NEXT_PID 2>/dev/null

echo ""
echo "Both services have been stopped."
'''
