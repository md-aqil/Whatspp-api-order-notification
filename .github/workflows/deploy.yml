name: Remote Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 187.127.154.55
          username: aqil
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/lcsw
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/deploy.sh
            sudo ./deploy/deploy.sh
